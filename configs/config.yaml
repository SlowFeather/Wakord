# ==========================================================================
# 全局配置。所有字段都有内置默认值（见 src/wakeup/config.py）。
# 这里只需写你想覆盖的项即可。命令行用 --config 指定本文件。
# ==========================================================================

paths:
  base_dir: artifacts          # 所有训练产物/下载文件的根目录
  model_path: models/xiaoyuan.onnx   # 训练完成后部署用的成品模型路径

data:
  target_word: "小元"
  num_samples: 1000            # TTS 合成的正样本数量（越多泛化越好，越慢）
  clip_seconds: 3              # 单条样本长度（秒），3 秒可凑足 >=16 帧特征
  speaker_id_min: 0            # vits-zh-aishell3 说话人 id 范围 0~173
  speaker_id_max: 173
  speed_min: 0.8               # 随机语速下限
  speed_max: 1.4               # 随机语速上限
  # 音频层增强：给 TTS 正样本叠加噪声/混响/增益/麦克风频响，缩小与真人/真麦的域差距。
  # 这是纯 TTS 也能尽量识别真实嗓音的关键；改完需 `wakeup prepare --force-features` 重建特征。
  audio_augment: true
  audio_augment_variants: 2    # 每条 TTS 样本额外生成的增强变体数（0=关；越大越慢越多样）

train:
  target_frames: 16
  embedding_dim: 96
  neg_pos_ratio: 8             # 负:正 样本比
  positive_target: 4000        # 正样本增强后的数量（词放随机位置+真实背景填充）
  augment_noise: 0.0           # 增强样本叠加的高斯噪声标准差（0=关）
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  val_split: 0.2
  seed: 42

service:
  host: "127.0.0.1"            # 控制接口监听地址（仅本机）
  port: 8765                   # 控制接口端口
  model_name: "xiaoyuan"       # 唤醒词模型名（事件回传里会带上）
  audio_device: null           # 音频输入设备 ID 或名称；null=使用系统默认输入设备
  audio_queue_size: 50         # 音频帧队列长度；过小时易丢帧，过大可能增加延迟
  threshold: 0.5               # 触发阈值，先用 listen 命令调参再改这里
  cooldown_seconds: 2.0        # 一次触发后多少秒内不重复触发
  start_listening: false       # 服务启动后是否立刻开始监听

  # ---- 功耗门控：只有检测到人声才跑唤醒词模型 ----
  vad_backend: "auto"          # auto(silero→webrtc→energy) | silero | webrtc | energy | none
  vad_aggressiveness: 2        # webrtc 模式 0~3，越大越严格（越不容易误判为人声）
  vad_silero_threshold: 0.5    # silero 人声概率阈值 0~1（偏低更灵敏、偏高更保守）
  energy_threshold: 0.012      # energy 模式的基准阈值（实际取与本底噪声×3 的较大者）
  hangover_frames: 8           # 已废弃：现不做 VAD 触发门控（保留仅为兼容旧配置）
  preroll_frames: 16           # 已废弃：现持续推理保持缓冲预热，无需前导回灌（保留仅为兼容旧配置）

  # 说明：监听时唤醒模型每帧都跑（openWakeWord 需连续音频，跳帧会漏检），按模型分+阈值+冷却触发。
  # vad_backend 现仅影响 `wakeup listen --debug` 的诊断显示。真正省电靠 stop 时释放麦克风。
