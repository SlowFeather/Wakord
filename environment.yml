# Conda environment definition.
#
# Create:
#   conda env create -f environment.yml
#   conda activate wakeup
#
# Then install this project in editable mode (enables the `wakeup` command):
#   pip install -e .
#
# Note: keep this file ASCII-only. Very old conda builds read it with the
# system code page (e.g. GBK on zh-CN Windows) and crash on non-ASCII bytes.
name: wakeup
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      - -r requirements.txt
